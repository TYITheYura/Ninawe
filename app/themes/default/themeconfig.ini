; ############################################# Theme info #############################################
[Theme]
name = Default Dark
version = 1.0
author = Ninawe dev.
description = Standard dark theme
; ######################################################################################################

; ############################################### Globals ##############################################
[Global]
font_family = resources\font\font.ttf
font_color = #AAFFFF
font_size = 10
font_shadow = True

; ######################################## Desktop configuration #######################################
[Desktop]
; /// Path to wallpaper
; Use only directory if you want to use carousel, otherwise full path to file
wallpaper_path = resources\wallpapers\

; /// Wallpaper mode
; Possible values:
; 	cover - stretch it to the entire diagonal of the workspace and cut off the excess
;	contain - fit into the workspace
wallpaper_mode = cover

; /// Wallpaper carousel settings
wallpaper_carousel = False
carousel_interval_min = 1
carousel_shuffle = false
wallpaper_transition_ms = 500
; ######################################################################################################

; ######################################## Taskbar configuration #######################################
[Taskbar]
; /// Orientation of the panel
; possible values: horizontal, vertical
orientation = horizontal

; /// Width and height of the panel
; possible values: %, px
width = 80%
height = 30px

; /// Position of the panel on the screen
; possible values: %
position_x = 50%
position_y = 5%

; /// The selectable offset of the panel. Affects how the panel will be aligned.
; possible values: %
anchor_x = 50%
anchor_y = 50%

; /// Panel borders
border_radius_px = 10
border_width_px = 1
argb_border_color = #AAFFFFFF

; /// Panel color
argb_color = #55FFFFFF

; /// Panel blur
; Due to some limitations and compatibility issues, this option does not support border_radius
; Use alpha channel on argb_color to make blur more visible
; If you use power saving mode, the blur may not render correctly
blur_enabled = True

; /// Blur type
; Possible values:
;	0 - default
;	1 - acrylic
blur_mode = 0

; /// Active taskbar widgets
; Use widget folder name to set widget
active_widgets = defaultClock
; ######################################################################################################

; ####################################### PowerMenu configuration ######################################
[PowerMenu]
; /// Fullscreen
; Possible values: 
;		False - PowerMenu is just panel with buttons
;		True - PowerMenu is fullscreen window
fullscreen = False

; /// Use background color on fullscreen
use_bg_color = False

; /// Menu layout
; Possible values:
; 	horizontal - arrange buttons horizontally
; 	vertical - arrange buttons vertically
menu_layout = horizontal

; /// Button container width/height
; Write 0 everywhere if you want the program to set the minimum possible values automatically.
width = 0
height = 0

; /// PowerMenu container background color
argb_container_color = #99666666

; /// PowerMenu double container background toggle
; It can be useful if you want to make a border -> colored padding between a container and border -> container
double_container_bg = True

; /// Double container background accent. 
; Possible values:
;	bg - pick argb_background_color as double container background accent
;	container - pick argb_container_color as double container background accent
double_container_bg_accent = bg

; /// PowerMenu fullscreen background color
argb_background_color = #55000000

; /// Background blur
; Due to some limitations and compatibility issues, this option does not support border_radius without fullscreen
; Use alpha channel on argb_color to make blur more visible
; If you use power saving mode, the blur may not render correctly
blur_enabled = True

; /// Blur mode
; Possible values:
; 	0 - default
;	1 - acrylic
blur_mode = 1

; /// Container margins
margins = 15

; /// Container paddings
paddings = 10

; /// Button size
button_size = 100

; /// Panel border
argb_border_color = #FFFFFFFF
border_radius = 50
border_width_px = 5

; /// Space between buttons
spacing = 15

; /// .SVG icons dir
; USE THE BUTTON ID AS THE FILE NAME!!! In this case, the program will find the icons automatically
icons_dir = resources\pm_icons

; /// Button colors
button_color = #55000000
hover_color = #AA999999
pressed_color = #FFFFFFFF

; /// Button border
button_border = 0
; ######################################################################################################

; ####################################### Launchpad configuration ######################################
[Launchpad]
blur_enabled = true
blur_radius = 20
argb_fullscreen = #00000080
icon_size = 100
sizing_mode = dynamic
container_min_width_perc = 20
container_max_width_perc = 80
container_min_height_perc = 20
container_max_height_perc = 80
container_grid_columns = 6
container_radius = 24
container_argb_color = #2B2B2BB3
container_argb_border_color = #FFFFFF1A
container_border_width = 1
; ######################################################################################################